<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AlphaLens · Sign In</title>
  <style>
    :root {
      --bg:     #0d1117;
      --bg2:    #161b22;
      --bg3:    #1c2128;
      --border: #30363d;
      --text:   #e6edf3;
      --muted:  #8b949e;
      --accent: #58a6ff;
      --red:    #f85149;
      --red-bg: #2d0f0e;
      --red-bd: #5a1e1c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 40px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-text {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 13px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
    }
    .error {
      background: var(--red-bg);
      border: 1px solid var(--red-bd);
      color: var(--red);
      font-size: 12px;
      border-radius: 7px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">AlphaLens</div>
      <div class="logo-sub">Investment Intelligence</div>
    </div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password"/>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
