<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>AlphaLens{% block title %}{% endblock %}</title>
  <style>
    :root {
      /* Surfaces (true black background, iOS dark style) */
      --bg:        #000000;
      --bg-card:   #1c1c1e;   /* tertiarySystemBackground dark */
      --bg-card-2: #2c2c2e;   /* card surface, slightly raised */
      --bg-elev:   #3a3a3c;   /* inner tiles */
      --border:    rgba(255,255,255,.08);
      --border-strong: rgba(255,255,255,.14);

      /* Text */
      --text:    #ffffff;
      --text-2:  rgba(235,235,245,.78);
      --muted:   rgba(235,235,245,.58);
      --muted-2: rgba(235,235,245,.36);

      /* Accents — iOS system colors */
      --accent:  #0a84ff;
      --green:   #30d158;
      --red:     #ff453a;
      --amber:   #ffd60a;
      --orange:  #ff9f0a;
      --purple:  #bf5af2;
      --pink:    #ff375f;
      --teal:    #5ac8fa;
      --indigo:  #5e5ce6;
      --yellow:  #ffd60a;

      --nav-h: 78px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.45;
      overflow-x: hidden;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 20px);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .page { max-width: 720px; margin: 0 auto; padding: 24px 18px 0; }

    /* ── Top header ──────────────────────────────────────── */
    .topbar {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 16px; padding: 0 4px;
    }
    .topbar h1 { font-size: 38px; font-weight: 800; letter-spacing: -.035em; line-height: 1; }
    .topbar .sub { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.4px; font-weight: 700; }

    /* ── Cards (iOS news / weather widget style) ─────────── */
    .card {
      background: var(--bg-card);
      border-radius: 22px;
      margin-bottom: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 1px 3px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .card-pad { padding: 22px 22px; }
    .card-pad-lg { padding: 28px 26px; }

    /* Card with a vibrant tinted background (weather-widget style) */
    .card.tint-green     { background: linear-gradient(155deg, #0e3a1f 0%, #102d18 60%, #081a0d 100%); }
    .card.tint-red       { background: linear-gradient(155deg, #3a1018 0%, #2a0d12 60%, #1a0509 100%); }
    .card.tint-blue      { background: linear-gradient(155deg, #0c2a4a 0%, #0a1e3a 60%, #061325 100%); }
    .card.tint-amber     { background: linear-gradient(155deg, #3a2a08 0%, #2a1f06 60%, #1a1304 100%); }
    .card.tint-purple    { background: linear-gradient(155deg, #2c0e3a 0%, #200a2a 60%, #14051a 100%); }
    .card.tint-slate     { background: linear-gradient(155deg, #2c2c2e 0%, #1c1c1e 60%, #141416 100%); }
    .card.tint-teal      { background: linear-gradient(155deg, #08363a 0%, #06262a 60%, #04181a 100%); }

    /* Eyebrow label (small uppercase header within a card) */
    .eyebrow {
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.4px;
      color: var(--muted);
    }
    .eyebrow.on-tint { color: rgba(255,255,255,.6); }

    /* ── Numbers, text ──────────────────────────────────── */
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .flat { color: var(--muted); }
    .ticker { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-weight: 800; letter-spacing: -.02em; }
    .ticker-blue { color: var(--accent); }
    .muted { color: var(--muted); }

    /* ── Badges / chips ─────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      border-radius: 100px; padding: 6px 14px;
      font-size: 13px; font-weight: 700; letter-spacing: .04em;
      background: rgba(255,255,255,.10); color: var(--text);
      white-space: nowrap;
    }
    .badge.aggressive { background: rgba(48,209,88,.18);  color: var(--green); }
    .badge.neutral    { background: rgba(255,255,255,.12); color: var(--text); }
    .badge.defensive  { background: rgba(255,69,58,.18);   color: var(--red); }

    .action {
      display: inline-flex; align-items: center;
      border-radius: 100px; padding: 5px 12px;
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      background: rgba(255,255,255,.08); color: var(--text-2);
      white-space: nowrap;
    }
    .action.enter_full    { background: rgba(48,209,88,.20);  color: var(--green); }
    .action.scale_in_half { background: rgba(10,132,255,.20); color: var(--accent); }
    .action.add           { background: rgba(48,209,88,.20);  color: var(--green); }
    .action.hold          { background: rgba(255,255,255,.08); color: var(--muted); }
    .action.trim          { background: rgba(255,159,10,.20); color: var(--orange); }
    .action.exit          { background: rgba(255,69,58,.20);  color: var(--red); }

    .outcome {
      display: inline-flex; align-items: center;
      border-radius: 100px; padding: 5px 12px;
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      background: rgba(255,255,255,.08); color: var(--text-2);
    }
    .outcome.win       { background: rgba(48,209,88,.20);  color: var(--green); }
    .outcome.loss      { background: rgba(255,69,58,.20);  color: var(--red); }
    .outcome.breakeven { background: rgba(255,255,255,.10); color: var(--muted); }
    .outcome.no_fill   { background: rgba(255,159,10,.20); color: var(--orange); }
    .outcome.cancelled { background: rgba(255,255,255,.06); color: var(--muted); }

    .item-status {
      display: inline-flex; align-items: center;
      border-radius: 100px; padding: 4px 11px;
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      background: rgba(255,255,255,.08); color: var(--text-2);
    }
    .item-status.open           { background: rgba(10,132,255,.18); color: var(--accent); }
    .item-status.filled         { background: rgba(255,159,10,.20); color: var(--orange); }
    .item-status.exited_target  { background: rgba(48,209,88,.20);  color: var(--green); }
    .item-status.exited_stop    { background: rgba(255,69,58,.20);  color: var(--red); }
    .item-status.exited_rotation,
    .item-status.exited_cancel,
    .item-status.expired,
    .item-status.cancelled      { background: rgba(255,255,255,.06); color: var(--muted); }

    /* ── Layer accent — sets a CSS var used by colored layer cards ── */
    .layer-pill {
      display: inline-flex; align-items: center;
      padding: 4px 12px; border-radius: 100px;
      font-size: 13px; font-weight: 800;
      letter-spacing: .04em; text-transform: lowercase;
      background: rgba(255,255,255,.10); color: var(--text);
    }
    .layer-pill.silicon     { background: rgba(255,214,10,.20);  color: var(--yellow); }
    .layer-pill.hyperscaler { background: rgba(10,132,255,.20);  color: var(--accent); }
    .layer-pill.power       { background: rgba(191,90,242,.20);  color: var(--purple); }
    .layer-pill.infra       { background: rgba(48,209,88,.20);   color: var(--green); }
    .layer-pill.model_lab   { background: rgba(255,55,95,.20);   color: var(--pink); }
    .layer-pill.application { background: rgba(90,200,250,.20);  color: var(--teal); }
    .layer-pill.device      { background: rgba(255,159,10,.20);  color: var(--orange); }
    .layer-pill.sovereign   { background: rgba(255,255,255,.10); color: var(--text); }

    /* Layer-tinted big cards (full background, no accent stripe) */
    .layer-card { padding: 22px 22px; }
    .layer-card.silicon     { background: linear-gradient(135deg, rgba(255,214,10,.10) 0%, transparent 70%); }
    .layer-card.hyperscaler { background: linear-gradient(135deg, rgba(10,132,255,.12) 0%, transparent 70%); }
    .layer-card.power       { background: linear-gradient(135deg, rgba(191,90,242,.12) 0%, transparent 70%); }
    .layer-card.infra       { background: linear-gradient(135deg, rgba(48,209,88,.10) 0%, transparent 70%); }
    .layer-card.model_lab   { background: linear-gradient(135deg, rgba(255,55,95,.12) 0%, transparent 70%); }
    .layer-card.application { background: linear-gradient(135deg, rgba(90,200,250,.12) 0%, transparent 70%); }
    .layer-card.device      { background: linear-gradient(135deg, rgba(255,159,10,.12) 0%, transparent 70%); }
    .layer-card.sovereign   { background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, transparent 70%); }

    /* ── Bottom nav (4 tabs after dropping /morning) ───── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(28,28,30,.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
      z-index: 200;
    }
    .bottom-nav a {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .bottom-nav a.active { color: var(--accent); }
    .nav-icon { font-size: 26px; line-height: 1; }

    .empty-state { text-align: center; padding: 56px 22px; color: var(--muted); }
    .empty-icon  { font-size: 52px; margin-bottom: 14px; opacity: .4; }

    /* ── Reusable: stat-strip (three columns) ─────────── */
    .stat-strip {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
      background: rgba(255,255,255,.08); border-radius: 18px; overflow: hidden;
      margin-bottom: 14px;
    }
    .stat-cell { background: var(--bg-card); padding: 16px 12px; text-align: center; }
    .stat-cell .lbl { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .stat-cell .v { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin-top: 6px; }

    /* ════════════════════════════════════════════════════════════════
       iOS Today View — widgets
       ════════════════════════════════════════════════════════════════ */

    :root {
      --widget-radius: 26px;
      --widget-radius-inner: 18px;
      --ease-ios: cubic-bezier(.32, .72, 0, 1);
      --shadow-widget:
        0 1px 0 rgba(255,255,255,.04) inset,
        0 1px 2px rgba(0,0,0,.4),
        0 8px 24px rgba(0,0,0,.35);
      --glass-bg: rgba(28, 28, 30, .72);
      --glass-stroke: rgba(255,255,255,.08);
    }

    /* iOS Today header — big title with day-of-week + date */
    .today-header {
      padding: 8px 6px 18px;
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 16px;
    }
    .today-header .greet {
      font-size: 13px; font-weight: 800; letter-spacing: 1.6px;
      text-transform: uppercase; color: var(--muted);
    }
    .today-header h1 {
      font-size: 40px; font-weight: 800; letter-spacing: -.035em; line-height: 1;
      margin-top: 6px;
    }
    .today-header .date-pill {
      background: rgba(255,255,255,.10);
      border: 1px solid var(--glass-stroke);
      border-radius: 100px;
      padding: 8px 14px;
      font-size: 12px; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-2);
      white-space: nowrap;
    }

    /* Widget grid — 2 columns, widgets can span 1 or 2 cols */
    .wgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .wgrid .w-full { grid-column: 1 / -1; }

    /* Section heading inside Today View (like "Suggested · Photos") */
    .w-section {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 6px 10px;
    }
    .w-section h2 {
      font-size: 22px; font-weight: 800; letter-spacing: -.02em;
    }
    .w-section .more {
      font-size: 14px; font-weight: 700; color: var(--accent);
      text-decoration: none;
    }

    /* Widget — base */
    .widget {
      position: relative;
      background: var(--bg-card);
      border-radius: var(--widget-radius);
      box-shadow: var(--shadow-widget);
      overflow: hidden;
      isolation: isolate;
      transition: transform .25s var(--ease-ios), filter .25s var(--ease-ios);
      -webkit-tap-highlight-color: transparent;
    }
    .widget::before {
      /* Top-edge highlight, like iOS glass */
      content: ""; position: absolute; inset: 0;
      border-radius: inherit;
      border: 1px solid var(--glass-stroke);
      pointer-events: none;
    }
    .widget.tap:active { transform: scale(.97); filter: brightness(1.08); }
    a.widget { display: block; color: inherit; text-decoration: none; }

    .widget-body { padding: 18px 18px; }
    .widget-body-lg { padding: 22px 22px; }

    /* Widget tints (vibrant gradients, weather-widget style) */
    .widget.w-weather-sun  { background: linear-gradient(160deg, #f59e0b 0%, #d97706 45%, #7c2d12 100%); color: #fff; }
    .widget.w-weather-mix  { background: linear-gradient(160deg, #3b82f6 0%, #1e3a8a 50%, #0c1e3a 100%); color: #fff; }
    .widget.w-weather-cloud{ background: linear-gradient(160deg, #4b5563 0%, #1f2937 60%, #0f172a 100%); color: #fff; }
    .widget.w-weather-storm{ background: linear-gradient(160deg, #ef4444 0%, #7f1d1d 55%, #1f0707 100%); color: #fff; }
    .widget.w-news         { background: linear-gradient(170deg, #1c1c1e 0%, #141416 100%); }
    .widget.w-reminders    { background: linear-gradient(170deg, #1c1c1e 0%, #2a1f08 100%); }
    .widget.w-calendar     { background: linear-gradient(170deg, #1c1c1e 0%, #1a0b22 100%); }
    .widget.w-battery      { background: linear-gradient(170deg, #1c1c1e 0%, #08231a 100%); }

    /* Widget header (icon + title + accessory) */
    .w-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .w-head .w-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 800; letter-spacing: .04em;
      color: rgba(255,255,255,.85);
    }
    .w-head .w-icon {
      width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center;
    }
    .w-head .w-icon svg { width: 100%; height: 100%; display: block; }
    .w-head .w-accessory { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.55); letter-spacing: .04em; }

    /* Weather widget */
    .w-weather .temp {
      font-size: 62px; font-weight: 300; letter-spacing: -.04em; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .w-weather .cond {
      font-size: 15px; font-weight: 600; margin-top: 6px;
      color: rgba(255,255,255,.85); letter-spacing: -.005em;
    }
    .w-weather .row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 18px; font-size: 12px;
      color: rgba(255,255,255,.7); letter-spacing: .04em;
    }
    .w-weather .row strong { color: #fff; font-weight: 800; }

    /* Battery widget */
    .w-batt .val {
      font-size: 32px; font-weight: 800; letter-spacing: -.025em;
      font-variant-numeric: tabular-nums;
    }
    .w-batt .delta { font-size: 14px; font-weight: 700; margin-top: 4px; letter-spacing: -.01em; }
    .w-batt .bar {
      margin-top: 14px;
      height: 14px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,.4);
      padding: 1.5px;
      position: relative;
      display: flex; align-items: stretch;
      background: rgba(255,255,255,.03);
    }
    .w-batt .bar::after {
      /* Battery cap */
      content: ""; position: absolute;
      right: -4px; top: 50%; transform: translateY(-50%);
      width: 2.5px; height: 7px; border-radius: 1px;
      background: rgba(255,255,255,.4);
    }
    .w-batt .bar-fill {
      border-radius: 2px;
      background: var(--green);
      transition: width .6s var(--ease-ios);
    }
    .w-batt .bar-fill.neg   { background: var(--red); }
    .w-batt .bar-fill.flat  { background: var(--muted); }

    /* Calendar widget */
    .w-cal .day {
      font-size: 13px; font-weight: 800; letter-spacing: .1em;
      color: var(--red);  /* iOS calendar uses red for weekday */
      text-transform: uppercase;
    }
    .w-cal .dom {
      font-size: 36px; font-weight: 800; line-height: 1;
      letter-spacing: -.03em; margin: 2px 0 12px;
    }
    .w-cal .event {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 4px 0; font-size: 13px;
      border-left: 3px solid var(--accent); padding-left: 9px;
    }
    .w-cal .event + .event { margin-top: 6px; }
    .w-cal .event.done { border-left-color: var(--green); opacity: .55; }
    .w-cal .event.next { border-left-color: var(--orange); }
    .w-cal .event .t {
      font-size: 11px; font-weight: 800; color: var(--muted);
      width: 46px; flex-shrink: 0; letter-spacing: .03em;
    }
    .w-cal .event .ttl { color: var(--text); font-weight: 600; }

    /* Reminders widget — checkbox list */
    .w-rem .rem-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; font-size: 14px;
    }
    .w-rem .rem-row + .rem-row { border-top: 1px solid rgba(255,255,255,.06); }
    .w-rem .check {
      flex-shrink: 0;
      width: 20px; height: 20px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.32);
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent;
      transition: all .2s var(--ease-ios);
    }
    .w-rem .check.done { background: var(--green); border-color: var(--green); }
    .w-rem .check.done::after {
      content: ""; width: 9px; height: 5px;
      border-left: 2px solid #000; border-bottom: 2px solid #000;
      transform: rotate(-45deg) translate(1px, -1px);
    }
    .w-rem .check.cancel { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); }
    .w-rem .check.cancel::after {
      content: "×"; color: var(--muted); font-size: 14px; line-height: 1; font-weight: 700;
    }
    .w-rem .rem-tx { flex: 1; min-width: 0; }
    .w-rem .rem-tx .top {
      display: flex; align-items: baseline; gap: 8px; justify-content: space-between;
    }
    .w-rem .rem-tx .tk { font-size: 15px; font-weight: 800; letter-spacing: -.01em; }
    .w-rem .rem-tx .px {
      font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--muted);
    }
    .w-rem .rem-tx .sub {
      font-size: 11px; color: var(--muted); margin-top: 2px;
      letter-spacing: .04em;
    }
    .w-rem .rem-tx .sub .strike { text-decoration: line-through; }

    /* News widget — headline-style card */
    .w-news .kicker {
      font-size: 11px; font-weight: 800; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 8px;
    }
    .w-news .headline {
      font-size: 19px; font-weight: 700; line-height: 1.3;
      letter-spacing: -.015em; color: var(--text);
    }
    .w-news .lede {
      margin-top: 10px; font-size: 13px; line-height: 1.5;
      color: var(--text-2);
    }
    .w-news .byline {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 11px; color: var(--muted); letter-spacing: .04em;
      display: flex; gap: 8px; align-items: center;
    }

    /* ── Widget Stack (swipeable, scroll-snap) ──────────── */
    .w-stack { position: relative; }
    .w-stack-track {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      /* hide scroll edge against page padding */
      margin: 0 -18px;
      padding-left: 18px; padding-right: 18px;
    }
    .w-stack-track::-webkit-scrollbar { display: none; }
    .w-stack-track > .widget {
      flex: 0 0 100%;
      scroll-snap-align: center;
    }
    .w-stack-dots {
      display: flex; justify-content: center; gap: 6px;
      margin-top: 4px;
    }
    .w-stack-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.20);
      transition: background .2s var(--ease-ios), transform .2s var(--ease-ios);
    }
    .w-stack-dots span.on {
      background: rgba(255,255,255,.75);
      transform: scale(1.15);
    }

    /* Smooth widget entry animation */
    @keyframes widget-rise {
      from { opacity: 0; transform: translateY(12px) scale(.96); }
      to   { opacity: 1; transform: none; }
    }
    .widget, .w-section { animation: widget-rise .5s var(--ease-ios) both; }
    .wgrid > :nth-child(1), .w-section:nth-of-type(1) { animation-delay: .04s; }
    .wgrid > :nth-child(2) { animation-delay: .08s; }
    .wgrid > :nth-child(3) { animation-delay: .12s; }
    .wgrid > :nth-child(4) { animation-delay: .16s; }

    @media (prefers-reduced-motion: reduce) {
      .widget, .w-section { animation: none; }
    }

    }

  </style>

<script>
  // Widget-stack dot indicator (iOS-style swipe).
  // Each .w-stack contains a .w-stack-track (scroll-snap-x) and .w-stack-dots.
  document.querySelectorAll('.w-stack').forEach(function (stack) {
    var track = stack.querySelector('.w-stack-track');
    var dots  = stack.querySelector('.w-stack-dots');
    if (!track || !dots) return;
    var cards = Array.prototype.slice.call(track.children);
    if (cards.length < 2) { dots.style.display = 'none'; return; }
    dots.innerHTML = cards.map(function () { return '<span></span>'; }).join('');
    var dotEls = dots.querySelectorAll('span');
    dotEls[0].classList.add('on');

    function setActive() {
      var x = track.scrollLeft + track.clientWidth / 2;
      var best = 0, bestD = Infinity;
      cards.forEach(function (c, i) {
        var mid = c.offsetLeft + c.clientWidth / 2;
        var d = Math.abs(mid - x);
        if (d < bestD) { bestD = d; best = i; }
      });
      dotEls.forEach(function (d, i) { d.classList.toggle('on', i === best); });
    }
    var raf = null;
    track.addEventListener('scroll', function () {
      if (raf) return;
      raf = requestAnimationFrame(function () { setActive(); raf = null; });
    }, { passive: true });
  });
</script>
