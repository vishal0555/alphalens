<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AlphaLens{% block title %}{% endblock %}</title>
  <style>
    :root {
      --bg:       #0d1117;
      --bg2:      #161b22;
      --bg3:      #1c2128;
      --border:   #30363d;
      --border2:  #21262d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --green-bg: #0d2818;
      --green-bd: #1a4731;
      --red:      #f85149;
      --red-bg:   #2d0f0e;
      --red-bd:   #5a1e1c;
      --amber:    #d29922;
      --amber-bg: #2b1d09;
      --amber-bd: #5a3a0a;
      --sidebar-w: 200px;
      --topnav-h:  48px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.6; }

    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--bg2); border-right: 1px solid var(--border);
      padding: 20px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-logo { padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .sidebar-logo-text { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
    .sidebar-logo-sub  { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .nav-section { padding: 0 8px; margin-bottom: 4px; }
    .nav-section-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 8px 8px 4px; }
    .nav-link { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 12px; color: var(--muted); text-decoration: none; transition: all .15s; }
    .nav-link:hover, .nav-link.active { background: var(--bg3); color: var(--text); }
    .nav-icon { font-size: 13px; width: 16px; text-align: center; }

    .topnav {
      display: none; position: sticky; top: 0; z-index: 100;
      background: rgba(22,27,34,.97); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; white-space: nowrap; scrollbar-width: none; height: var(--topnav-h); padding: 0 12px;
    }
    .topnav::-webkit-scrollbar { display: none; }
    .topnav-inner { display: inline-flex; align-items: center; gap: 4px; height: 100%; }
    .topnav-link { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--muted); text-decoration: none; white-space: nowrap; transition: all .15s; }
    .topnav-link:hover, .topnav-link.active { background: var(--bg3); color: var(--text); }

    .main { flex: 1; padding: 24px 28px; max-width: 960px; overflow-x: hidden; }

    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
    .card-header { background: var(--bg3); border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; }
    .card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .card-sub   { font-size: 11px; color: var(--muted); }
    .card-body  { padding: 16px 18px; }

    .pos  { color: var(--green); }
    .neg  { color: var(--red);   }
    .flat { color: var(--muted); }

    .badge { display: inline-flex; align-items: center; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; white-space: nowrap; border: 1px solid transparent; }
    .badge-live  { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .badge-mock  { color: var(--muted); background: var(--bg3);      border-color: var(--border);   }
    .badge-buy   { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .badge-hold  { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bd); }
    .badge-nosig { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd);   }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; transition: all .15s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--muted); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topnav  { display: block; }
      .main { padding: 12px 12px 24px; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="layout">

  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">AlphaLens</div>
      <div class="sidebar-logo-sub">Investment Intelligence</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Navigation</div>
      <a class="nav-link {% if active=='index' %}active{% endif %}" href="/"><span class="nav-icon">📊</span> Dashboard</a>
      <a class="nav-link {% if active=='briefing' %}active{% endif %}" href="/briefing/latest"><span class="nav-icon">📰</span> Latest Briefing</a>
      <a class="nav-link {% if active=='signal' %}active{% endif %}" href="/signal/latest"><span class="nav-icon">📡</span> Latest Signal</a>
    </div>
  </nav>

  <div class="topnav">
    <div class="topnav-inner">
      <a class="topnav-link {% if active=='index' %}active{% endif %}" href="/">📊 Dashboard</a>
      <a class="topnav-link {% if active=='briefing' %}active{% endif %}" href="/briefing/latest">📰 Briefing</a>
      <a class="topnav-link {% if active=='signal' %}active{% endif %}" href="/signal/latest">📡 Signal</a>
    </div>
  </div>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>
{% block scripts %}{% endblock %}
</body>
</html>
