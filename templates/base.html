<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AlphaLens{% block title %}{% endblock %}</title>
  <style>
    :root {
      --bg:       #0d1117;
      --bg2:      #161b22;
      --bg3:      #1c2128;
      --border:   #30363d;
      --border2:  #21262d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --green-bg: rgba(63,185,80,.10);
      --green-bd: rgba(63,185,80,.30);
      --red:      #f85149;
      --red-bg:   rgba(248,81,73,.10);
      --red-bd:   rgba(248,81,73,.30);
      --amber:    #d29922;
      --amber-bg: rgba(210,153,34,.10);
      --amber-bd: rgba(210,153,34,.30);
      --nav-h:    62px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
      overflow-x: hidden;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 12px);
    }
    .page { max-width: 560px; margin: 0 auto; padding: 16px 14px 0; }

    /* ── Top header (page title + small subtitle) ─────────── */
    .topbar {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px;
    }
    .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: -.01em; }
    .topbar .sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 700; }

    /* ── Cards ──────────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-header {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 11px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text); }
    .card-sub   { font-size: 11px; color: var(--muted); }
    .card-body  { padding: 14px 16px; }
    .card-body.tight { padding: 6px 0; }

    /* ── PnL / number colouring ─────────────────────────── */
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .flat { color: var(--muted); }
    .num { font-variant-numeric: tabular-nums; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* ── Badges ─────────────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: .04em; border: 1px solid transparent; white-space: nowrap; }
    .badge.aggressive { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .badge.neutral    { color: var(--muted); background: var(--bg3);      border-color: var(--border); }
    .badge.defensive  { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd); }

    .action { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); white-space: nowrap; }
    .action.enter_full    { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .action.scale_in_half { color: var(--accent); background: rgba(88,166,255,.10); border-color: rgba(88,166,255,.30); }
    .action.add           { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .action.hold          { color: var(--muted); }
    .action.trim          { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bd); }
    .action.exit          { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd); }

    .outcome { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); }
    .outcome.win       { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .outcome.loss      { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd); }
    .outcome.breakeven { color: var(--muted); }
    .outcome.no_fill   { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bd); }
    .outcome.cancelled { color: var(--muted); border-style: dashed; }

    .item-status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); }
    .item-status.open           { color: var(--accent); background: rgba(88,166,255,.10); border-color: rgba(88,166,255,.30); }
    .item-status.filled         { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bd); }
    .item-status.exited_target  { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .item-status.exited_stop    { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd); }
    .item-status.exited_rotation,
    .item-status.exited_cancel,
    .item-status.expired,
    .item-status.cancelled      { color: var(--muted); }

    /* Layer colour chips (8 AI-stack layers) */
    .layer { display: inline-block; padding: 1px 7px; border-radius: 9px; font-size: 10px; font-weight: 700; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); text-transform: lowercase; letter-spacing: .02em; }
    .layer.silicon     { color: #e3b341; border-color: rgba(227,179,65,.30); background: rgba(227,179,65,.08); }
    .layer.hyperscaler { color: #58a6ff; border-color: rgba(88,166,255,.30); background: rgba(88,166,255,.08); }
    .layer.power       { color: #d2a8ff; border-color: rgba(210,168,255,.30); background: rgba(210,168,255,.08); }
    .layer.infra       { color: var(--green); border-color: var(--green-bd); background: var(--green-bg); }
    .layer.model_lab   { color: #ff7b72; border-color: rgba(255,123,114,.30); background: rgba(255,123,114,.08); }
    .layer.application { color: #79c0ff; border-color: rgba(121,192,255,.30); background: rgba(121,192,255,.08); }
    .layer.device      { color: #ffa657; border-color: rgba(255,166,87,.30); background: rgba(255,166,87,.08); }
    .layer.sovereign   { color: #c9d1d9; border-color: var(--border); background: var(--bg3); }

    .ticker { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--accent); font-weight: 700; }
    .muted { color: var(--muted); }

    /* ── Tables ─────────────────────────────────────────── */
    .row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border2);
    }
    .row:last-child { border-bottom: none; }
    .row a { color: var(--text); text-decoration: none; display: contents; }
    .row-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
    .row-meta { font-size: 11px; color: var(--muted); }
    .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }

    /* ── Bottom nav (5 tabs) ────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(22,27,34,.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }
    .bottom-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--muted);
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .3px;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .bottom-nav a.active { color: var(--accent); }
    .nav-icon { font-size: 20px; line-height: 1; }

    .empty-state { text-align: center; padding: 32px 16px; color: var(--muted); }
    .empty-icon  { font-size: 36px; margin-bottom: 10px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="page">
  {% block content %}{% endblock %}
</div>

<nav class="bottom-nav">
  <a href="/" class="{% if active=='dashboard' %}active{% endif %}">
    <span class="nav-icon">◉</span><span>Today</span>
  </a>
  <a href="/universe" class="{% if active=='universe' %}active{% endif %}">
    <span class="nav-icon">⬢</span><span>Universe</span>
  </a>
  <a href="/morning" class="{% if active=='morning' %}active{% endif %}">
    <span class="nav-icon">☀</span><span>Morning</span>
  </a>
  <a href="/positions" class="{% if active=='positions' %}active{% endif %}">
    <span class="nav-icon">◈</span><span>Book</span>
  </a>
  <a href="/debriefs" class="{% if active=='debriefs' %}active{% endif %}">
    <span class="nav-icon">◐</span><span>Debriefs</span>
  </a>
</nav>
{% block scripts %}{% endblock %}
</body>
</html>
