<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AlphaLens{% block title %}{% endblock %}</title>
  <style>
    :root {
      --bg:       #0d1117;
      --bg2:      #161b22;
      --bg3:      #1c2128;
      --border:   #30363d;
      --border2:  #21262d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --green-bg: rgba(63,185,80,.1);
      --green-bd: rgba(63,185,80,.25);
      --red:      #f85149;
      --red-bg:   rgba(248,81,73,.1);
      --red-bd:   rgba(248,81,73,.25);
      --amber:    #d29922;
      --amber-bg: rgba(210,153,34,.1);
      --amber-bd: rgba(210,153,34,.25);
      --nav-h:    60px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 8px);
    }

    .page { max-width: 560px; margin: 0 auto; padding: 16px 14px 0; }

    /* ── Bottom nav ───────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(22,27,34,.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }
    .bottom-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--muted);
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .5px;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .bottom-nav a.active { color: var(--accent); }
    .nav-icon { font-size: 22px; line-height: 1; }

    /* ── Cards ────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-header {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .card-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
    .card-sub   { font-size: 11px; color: var(--muted); }
    .card-body  { padding: 4px 0; }

    /* ── Badges ───────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; border: 1px solid transparent; white-space: nowrap; }
    .badge-live  { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .badge-mock  { color: var(--muted); background: var(--bg3);      border-color: var(--border);   }
    .badge-buy   { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
    .badge-hold  { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bd); }
    .badge-nosig { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd);   }

    /* ── Buttons ──────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; transition: all .15s; -webkit-tap-highlight-color: transparent; }
    .btn-primary   { background: var(--accent); color: #0d1117; }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .empty-state { text-align: center; padding: 32px 16px; color: var(--muted); }
    .empty-icon  { font-size: 36px; margin-bottom: 10px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="page">
  {% block content %}{% endblock %}
</div>

<nav class="bottom-nav">
  <a href="/" class="{% if active=='index' %}active{% endif %}">
    <span class="nav-icon">📊</span>
    <span>Dashboard</span>
  </a>
  <a href="/briefing/latest" class="{% if active=='briefing' %}active{% endif %}">
    <span class="nav-icon">📰</span>
    <span>Briefing</span>
  </a>
  <a href="/signal/latest" class="{% if active=='signal' %}active{% endif %}">
    <span class="nav-icon">📡</span>
    <span>Signal</span>
  </a>
</nav>
{% block scripts %}{% endblock %}
</body>
</html>
